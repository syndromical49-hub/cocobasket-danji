<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코코바스켓 주문관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
.header{background:#2d7a4f;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px}
.header h1{font-size:18px;font-weight:700}
.header span{font-size:13px;opacity:0.8}
.header .sync-status{margin-left:auto;font-size:11px;opacity:0.9;background:rgba(255,255,255,0.15);padding:3px 8px;border-radius:10px}
.main{max-width:1100px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.tab.on{background:#2d7a4f;color:#fff}
.tab:not(.on){background:#fff;color:#555;border:1px solid #ddd}
.rtab{padding:6px 14px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.rtab.on{background:#2d7a4f;color:#fff}
.rtab:not(.on){background:#f0f0f0;color:#555}
.rbadge{display:inline-block;background:rgba(255,255,255,0.3);border-radius:10px;padding:0 5px;font-size:11px;font-weight:700;margin-left:2px}
.rtab:not(.on) .rbadge{background:rgba(0,0,0,0.1)}
.region-label{font-size:11px;font-weight:700;color:#fff;padding:3px 8px;border-radius:4px;margin-bottom:8px;display:inline-block}
.region-label.unjeong{background:#2d7a4f}
.region-label.goyang{background:#185FA5}
.panel{display:none}.panel.on{display:block}

.input-area{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #e5e7eb}
.input-area label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:6px}
textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:vertical;line-height:1.6;color:#1a1a1a}
textarea:focus{outline:none;border-color:#2d7a4f}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.1s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:#2d7a4f;color:#fff}
.btn-primary:hover:not(:disabled){background:#256040}
.btn-secondary{background:#f0f2f5;color:#333;border:1px solid #ddd}
.btn-print{background:#185FA5;color:#fff}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}

.result-section{margin-bottom:20px}
.result-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.badge{background:#2d7a4f;color:#fff;font-size:11px;padding:2px 8px;border-radius:20px}

.pack-order-block{background:#fff;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden}
.pack-order-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #e5e7eb}
.pack-order-num{background:#2d7a4f;color:#fff;font-size:12px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none}
.pack-order-name{font-size:13px;font-weight:700;flex:1}
.pack-order-total{font-size:13px;font-weight:700;color:#2d7a4f}
.pack-order-block .packing-grid{padding:10px}

.packing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.pack-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.pack-name{font-size:13px;font-weight:500}
.pack-qty{font-size:16px;font-weight:700;color:#2d7a4f}
.pack-check{width:20px;height:20px;border:2px solid #ddd;border-radius:4px;flex:none}
.pack-item.done{opacity:0.4}
.pack-item.done .pack-name{text-decoration:line-through}

.delivery-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.d-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;position:relative}
.d-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.d-name{font-size:15px;font-weight:700}
.d-phone{font-size:12px;color:#888;margin-top:2px}
.d-total{font-size:16px;font-weight:700;color:#2d7a4f;white-space:nowrap}
.d-addr{font-size:12px;color:#444;background:#f8f9fa;padding:6px 10px;border-radius:6px;margin-bottom:8px;line-height:1.5}
.d-entry-inline{font-size:11px;color:#e8622a;font-weight:700;background:#fff0e8;padding:2px 6px;border-radius:4px;margin-left:4px}
.d-items{font-size:12px;color:#555;line-height:1.8}
.d-item-row{display:flex;justify-content:space-between}
.no-match{font-size:11px;color:#aaa}

.btn-add-db{background:#185FA5;color:#fff;border:none;border-radius:4px;font-size:10px;font-weight:700;padding:2px 7px;cursor:pointer;font-family:inherit}
.btn-add-db:hover{background:#0f4a8a}
.btn-add-db:disabled{opacity:0.5;cursor:not-allowed}

.db-status{font-size:12px;padding:6px 12px;border-radius:6px;display:inline-block}
.db-ok{background:#e8f5ee;color:#2d7a4f;font-weight:700}
.db-none{background:#fff0e8;color:#c04000}
.db-loading{background:#e8f0ff;color:#185FA5;font-weight:700}

/* 주문 이력 패널 */
.history-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.history-filters input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit}
.history-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:13px}
.history-table th{background:#f8f9fa;padding:10px 12px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb}
.history-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.history-table tr:last-child td{border-bottom:none}
.history-table tr:hover td{background:#f8f9fa}
.items-cell{font-size:11px;color:#666;line-height:1.7}

/* 재고/통계 패널 */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;color:#2d7a4f}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px}

.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;display:none;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* 단골 랭킹 */
.loyal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.loyal-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.loyal-chip{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;color:#333}
.loyal-chip span{color:#2d7a4f;font-size:18px;font-weight:700;margin-right:4px}
.loyal-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:13px}
.loyal-table th{background:#f8f9fa;padding:10px 12px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb;white-space:nowrap}
.loyal-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.loyal-table tr:last-child td{border-bottom:none}
.loyal-table tr:hover td{background:#f8f9fa}
.loyal-rank{font-size:16px;text-align:center}
.loyal-cnt{font-weight:700;color:#2d7a4f;font-size:15px}
.loyal-amt{font-weight:700;color:#185FA5}
.loyal-date{font-size:11px;color:#aaa}
.loyal-bar-wrap{width:80px;background:#f0f2f5;border-radius:4px;height:6px;overflow:hidden}
.loyal-bar{height:6px;background:#2d7a4f;border-radius:4px;transition:width .4s}
.period-cust-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:12px;margin-top:8px}
.period-cust-table th{background:#f8f9fa;padding:8px 10px;text-align:left;font-weight:700;border-bottom:2px solid #e5e7eb}
.period-cust-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
.period-cust-table tr:last-child td{border-bottom:none}

@media print{
  .header,.tabs,.input-area,.btn-row,.no-print{display:none!important}
  .panel{display:none!important}
  .panel.on{display:block!important}
  .delivery-cards{grid-template-columns:repeat(2,1fr)}
  .d-card{break-inside:avoid;border:1px solid #999}
  body{background:#fff}
  .btn-add-db{display:none!important}
}
</style>
</head>
<body>

<div class="header">
  <span>🧺</span>
  <h1>코코바스켓 주문관리</h1>
  <span>패킹 · 배송 자동화</span>
  <span class="sync-status" id="syncStatus">⏳ DB 연결 중...</span>
</div>

<div class="main">
  <!-- DB 상태 -->
  <div class="input-area no-print">
    <div class="btn-row">
      <span class="db-status db-loading" id="dbStatus">⏳ DB 불러오는 중...</span>
      <button class="btn btn-secondary" onclick="loadCustomersFromDB()">🔄 새로고침</button>
      <button class="btn btn-secondary" onclick="exportDB()" id="exportBtn">📋 내보내기 (TSV)</button>
    </div>
  </div>

  <!-- 주문 입력 -->
  <div class="input-area no-print">
    <label>📦 오늘 주문 전체 붙여넣기 (카카오 복사)</label>
    <textarea id="orderInput" rows="10" placeholder="카카오에서 오늘 주문 전체 복사해서 붙여넣기..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="parseOrders()">🔍 주문 분석</button>
      <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
      <button class="btn btn-print no-print" onclick="window.print()">🖨️ 인쇄</button>
    </div>
    <button class="btn" id="btnLoadWeb" onclick="loadWebOrders()" style="width:100%;margin-top:8px;background:#2d7a4f;color:#fff;font-weight:700;font-size:14px;padding:12px;border-radius:10px;border:none;cursor:pointer;">
      📲 오늘 웹주문 불러오기 (계산기 접수분)
    </button>
    <button onclick="loadExtraOrders()" style="width:100%;margin-top:6px;background:#f59e0b;color:#1a1a1a;font-weight:900;font-size:13px;padding:10px;border-radius:10px;border:none;cursor:pointer;">
      ➕ 추가 주문 불러오기 (오전 9시 이후분)
    </button>
    <div id="webOrderStatus" style="font-size:12px;color:#666;margin-top:4px;text-align:center;"></div>
  </div>

  <!-- 탭 -->
  <div class="tabs no-print">
    <button class="tab on" onclick="switchTab('packing',this)">📦 패킹 리스트</button>
    <button class="tab" onclick="switchTab('delivery',this)">🚚 배송 카드</button>
    <button class="tab" onclick="switchTab('history',this)">📋 주문 이력</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 통계</button>
    <button class="tab" onclick="switchTab('loyal',this);loadLoyalStats()">👑 단골랭킹</button>
    <button class="tab" onclick="openRevenue()">💰 매출</button>
  </div>

  <!-- 매출 비번 모달 -->
  <!-- 주문 편집 모달 -->
  <div id="oedit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:10000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:24px 20px;width:340px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <div style="font-size:1rem;font-weight:900;color:#1b1b1b;margin-bottom:4px;">✏️ 주문 수정</div>
      <div id="oedit-name" style="font-size:0.8rem;color:#888;margin-bottom:10px;"></div>
      <div id="oedit-items" style="background:#f9f7f2;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:0.8rem;color:#444;line-height:1.8;min-height:30px;"></div>
      <div style="font-size:0.78rem;font-weight:700;color:#555;margin-bottom:5px;">금액 수정 (원)</div>
      <input id="oedit-total" type="number" inputmode="numeric"
        style="width:100%;padding:10px 14px;border:2px solid #e0ddd5;border-radius:10px;font-size:1.1rem;font-weight:700;margin-bottom:16px;box-sizing:border-box;text-align:right;"
        onkeydown="if(event.key==='Enter')saveOrderEdit()">
      <div style="display:flex;gap:8px;">
        <button onclick="deleteOrderEdit()" style="flex:1;padding:11px;border:none;border-radius:10px;background:#fff0f0;color:#e63946;font-weight:700;font-size:0.9rem;cursor:pointer;">🗑️ 삭제</button>
        <button onclick="document.getElementById('oedit-modal').style.display='none'" style="flex:1;padding:11px;border:none;border-radius:10px;background:#f0f0f0;color:#555;font-weight:700;cursor:pointer;">취소</button>
        <button onclick="saveOrderEdit()" style="flex:1.5;padding:11px;border:none;border-radius:10px;background:#2d7a4f;color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;">💾 저장</button>
      </div>
    </div>
  </div>

  <div id="revenue-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:28px 24px;width:300px;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
      <div style="font-size:2rem;margin-bottom:8px;">🔒</div>
      <div style="font-size:1rem;font-weight:700;color:#1b1b1b;margin-bottom:4px;">매출 확인</div>
      <div style="font-size:0.8rem;color:#888;margin-bottom:16px;">코코 전용 · 비밀번호를 입력하세요</div>
      <input id="revenue-pw-input" type="password" placeholder="비밀번호"
        style="width:100%;padding:10px 14px;border:2px solid #e0ddd5;border-radius:10px;font-size:1rem;text-align:center;margin-bottom:12px;box-sizing:border-box;"
        onkeydown="if(event.key==='Enter')checkRevenuePw()">
      <div id="revenue-pw-err" style="color:#e63946;font-size:0.8rem;margin-bottom:8px;display:none;">비밀번호가 틀렸어요</div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeRevenueModal()" style="flex:1;padding:10px;border:none;border-radius:10px;background:#f0f0f0;color:#555;font-weight:700;cursor:pointer;">취소</button>
        <button onclick="checkRevenuePw()" style="flex:1;padding:10px;border:none;border-radius:10px;background:#2d7a4f;color:#fff;font-weight:700;cursor:pointer;">확인</button>
      </div>
    </div>
  </div>

  <!-- 매출 패널 -->
  <div id="panel-revenue" class="panel">
    <div class="result-section no-print">
      <div class="result-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>💰 매출 현황</span>
        <button onclick="closeRevenue()" style="font-size:12px;background:#f0f0f0;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;color:#555;">잠금</button>
      </div>

      <!-- 요약 3카드 -->
      <div id="revSummary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;"></div>

      <!-- 기간 선택 -->
      <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
        <button class="btn" onclick="setRevPeriod('today')" style="font-size:12px;padding:6px 12px;">오늘</button>
        <button class="btn" onclick="setRevPeriod('week')" style="font-size:12px;padding:6px 12px;">이번 주</button>
        <button class="btn" onclick="setRevPeriod('month')" style="font-size:12px;padding:6px 12px;">이번 달</button>
        <button class="btn" onclick="setRevPeriod('lastmonth')" style="font-size:12px;padding:6px 12px;">지난 달</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">
        <input type="date" id="revFrom" style="border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:13px;">
        <span style="color:#aaa;">~</span>
        <input type="date" id="revTo" style="border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:13px;">
        <button class="btn" onclick="loadRevenue()" style="font-size:12px;padding:6px 14px;">조회</button>
      </div>

      <!-- 매출 상세 -->
      <div id="revDetail"></div>

      <!-- 기타 매출 입력 -->
      <div style="margin-top:20px;border-top:1px solid #eee;padding-top:16px;">
        <div style="font-size:14px;font-weight:900;color:#2d6a4f;margin-bottom:10px;">➕ 기타 매출 추가</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;gap:6px;">
            <input type="date" id="extraDate" style="flex:1;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;">
            <input type="number" id="extraAmount" placeholder="금액 (원)" style="flex:1;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;">
          </div>
          <input type="text" id="extraMemo" placeholder="메모 (예: 카라향 3kg 5박스)" style="border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;">
          <button onclick="addExtraSale()" style="background:#2d6a4f;color:white;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:900;cursor:pointer;">추가하기</button>
        </div>
        <div id="extraSalesList" style="margin-top:12px;"></div>
      </div>
    </div>
  </div>

  <!-- 패킹 패널 -->
  <div id="panel-packing" class="panel on">
    <div class="result-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div class="result-title" style="margin:0;">📦 패킹 리스트 <span class="badge" id="packCount">0개 품목</span></div>
        <div style="display:flex;gap:6px;">
          <button class="rtab on" id="ptab-order" onclick="switchPackView('order')">👤 주문자별</button>
          <button class="rtab" id="ptab-item" onclick="switchPackView('item')">📋 품목별 합계</button>
        </div>
      </div>
      <div id="packingList"></div>
      <div id="packingItemSummary" style="display:none;"></div>
    </div>
  </div>

  <!-- 배송 패널 -->
  <div id="panel-delivery" class="panel">
    <div class="result-section">
      <div class="result-title">🚚 배송 카드 <span class="badge" id="deliveryCount">0건</span></div>
      <div class="region-tabs no-print" id="regionTabs" style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
        <button class="rtab on" onclick="switchRegion('all',this)">전체 <span id="cnt-all" class="rbadge">0</span></button>
        <button class="rtab" onclick="switchRegion('unjeong',this)">🟢 운정 <span id="cnt-unjeong" class="rbadge">0</span></button>
        <button class="rtab" onclick="switchRegion('goyang',this)">🔵 고양·기타 <span id="cnt-goyang" class="rbadge">0</span></button>
        <button onclick="window.print()" style="margin-left:auto;padding:6px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">🖨️ 인쇄</button>
      </div>
      <div class="delivery-cards" id="deliveryCards"></div>
    </div>
  </div>

  <!-- 주문 이력 패널 -->
  <div id="panel-history" class="panel">
    <div class="result-section no-print">
      <div class="result-title">📋 주문 이력</div>
      <div class="history-filters">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <input type="date" id="filterDateFrom" style="font-size:13px;">
          <span style="color:#aaa;font-size:13px;">~</span>

async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res;
}

async function addCustomerToDB(idx) {
  const o = parsedOrders[idx];
  if (!o) return;
  const cleanPhone = o.phone.replace(/[^0-9]/g, '');

  const btn = document.querySelector(`#dcard-${idx} .btn-add-db`);
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const res = await api('/api/customers', 'POST', {
      name: o.name || '',
      phone: cleanPhone,
      address: o.address || '',
      entry: o.entry || '',
      memo: ''
    });

    if (res.status === 409) {
      showToast('이미 DB에 있는 연락처예요.');
      if (btn) { btn.disabled = false; btn.textContent = '+ DB 추가'; }
      return;
    }
    if (!res.ok) throw new Error('저장 실패');

    // 로컬 배열에도 추가
    customerDB.push({ name: o.name || '', phone: cleanPhone, address: o.address || '', entry: o.entry || '', memo: '' });
    localStorage.setItem('cocoDB', JSON.stringify(customerDB));

    parsedOrders[idx].dbMatch = true;
    if (btn) btn.outerHTML = '<span style="font-size:10px;color:#185FA5;font-weight:700">✓NEW</span>';

    const st = document.getElementById('dbStatus');
    st.textContent = `✅ DB ${customerDB.length}명 (신규 저장됨)`;
    st.className = 'db-status db-ok';
    showToast(`✅ ${o.name || cleanPhone} DB 저장 완료`);
  } catch (e) {
    showToast('❌ 저장 실패: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '+ DB 추가'; }
  }
}

async function saveOrdersToDB(orders) {
  const today = new Date().toISOString().slice(0, 10);
  for (const o of orders) {
    if (!o.items || o.items.length === 0) continue;
    const realName = o.name && o.name !== '재주문' ? o.name : '';
    if (o.isReorder && !realName && !o.address) continue;
    const phone = o.phone.replace(/[^0-9]/g, '') || null;
    if (!phone) continue;

    // 이미 오늘 DB에 있으면 저장 skip
    try {
      const chk = await fetch(`${_SURL}/rest/v1/orders?customer_phone=eq.${phone}&order_date=eq.${today}&total=eq.${o.total||0}&select=id&limit=1`,
        { headers: { apikey: _SKEY, Authorization: 'Bearer ' + _SKEY } });
      const existing = await chk.json();
      if (Array.isArray(existing) && existing.length > 0) continue;
    } catch(e) { console.warn('중복 체크 실패', e); continue; }

    try {
      await api('/api/orders', 'POST', {
        order: {
          customer_phone: phone,
          customer_name: realName,
          customer_address: o.address || '',
          order_date: today,
          total: o.total || 0
        },
        items: o.items
      });
    } catch (e) {
      console.warn('주문 저장 실패:', e);
    }
  }
}

async function lookupMissingReorders() {
  // 이름/주소 둘 다 없는 재주문만 대상 (이미 파싱된 정보 있으면 건드리지 않음)
  const missing = parsedOrders
    .map((o, i) => ({ o, i }))
    .filter(({ o }) => o.isReorder && !o.dbMatch && o.phone
      && (!o.name || o.name === '재주문') && !o.address);

  if (!missing.length) return;

  for (const { o, i } of missing) {
    const cleanPhone = o.phone.replace(/[^0-9]/g, '');
    try {
      const res = await api('/api/lookup?phone=' + cleanPhone);
      if (!res.ok) continue;
      const c = await res.json();
      // '재주문'으로 저장된 쓰레기 데이터는 무시
      if (!c || !c.name || c.name === '재주문') continue;

      parsedOrders[i] = {
        ...parsedOrders[i],
        name: c.name,
        address: c.address || o.address,
        entry: c.entry || o.entry,
        dbMatch: true
      };
      if (!customerDB.find(c2 => c2.phone === cleanPhone)) {
        customerDB.push({ name: c.name, phone: cleanPhone, address: c.address || '', entry: c.entry || '', memo: c.memo || '' });
      }
      updateDeliveryCard(i);
    } catch (e) { /* 조회 실패 시 무시 */ }
  }
}

function updateDeliveryCard(i) {
  const o = parsedOrders[i];
  const el = document.getElementById('dcard-' + i);
  if (!el) return;
  const itemsHtml = (o.items||[]).map(item => {
    const name = item.name || '';
    const qty = item.qty || 1;
    const price = item.price || 0;
    const displayName = qty > 1
      ? `<span style="font-weight:700">${name}</span><span style="font-weight:900;color:#e63946;margin-left:3px;">${qty}개</span>`
      : `<span>${name}</span>`;
    return `<div class="d-item-row"><span>${displayName}</span><span>${(price*qty).toLocaleString()}원</span></div>`;
  }).join('');
  const reorderBadge = o.isReorder ? '<span style="font-size:10px;background:#e8f0ff;color:#185FA5;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;">🔄재주문</span>' : '';
  el.innerHTML = `
    <div class="d-card-header">
      <div>
        <div class="d-name">${o.name || `주문 ${i+1}`}${reorderBadge} ${(o.entry && o.entry !== '없음') ? `<span class="d-entry-inline">🔑 ${o.entry}</span>` : `<span class="d-entry-inline" style="color:#aaa;background:#f5f5f5;">🔑 비번없음</span>`} <span style="font-size:10px;color:#2d7a4f">✓DB</span></div>
        <div class="d-phone">${formatPhone(o.phone)}</div>
      </div>
      <div class="d-total">${o.total ? o.total.toLocaleString()+'원' : ''}</div>
    </div>
    ${o.address ? `<div class="d-addr">📍 ${o.address}</div>` : ''}
    <div class="d-items">${itemsHtml || '<span class="no-match">품목 없음</span>'}</div>`;
}

// ===== 고객 찾기 =====
function findCustomer(phone, address) {
  if (!phone && !address) return null;
  const cleanPhone = (phone || '').replace(/[^0-9]/g, '');

  if (cleanPhone.length >= 10) {
    const match = customerDB.find(c => c.phone === cleanPhone || c.phone.endsWith(cleanPhone.slice(-8)));
    if (match) return match;
  }

  if (address && address.length > 5) {
    const addrClean = address.replace(/\s/g, '');
    const match = customerDB.find(c => {
      const dbAddr = c.address.replace(/\s/g, '');
      return dbAddr && (dbAddr.includes(addrClean.slice(-8)) || addrClean.includes(dbAddr.slice(-8)));
    });
    if (match) return match;
  }
  return null;
}

async function loadWebOrders() {
  const btn = document.getElementById('btnLoadWeb');
  const status = document.getElementById('webOrderStatus');
  btn.disabled = true;
  btn.textContent = '불러오는 중...';
  status.textContent = '';
  try {
    // ── 오전 9시 기준 배송분 계산 ──
    const now = new Date();
    const todayCutoff = new Date(now);
    todayCutoff.setHours(9, 0, 0, 0);
    const nextCutoff = new Date(todayCutoff);
    nextCutoff.setDate(todayCutoff.getDate() + 1);
    const prevCutoff = new Date(todayCutoff);
    prevCutoff.setDate(todayCutoff.getDate() - 1);

    // 오전 9시 이후 → 오늘 9시~내일 9시 (내일 배송분)
    // 오전 9시 이전 → 어제 9시~오늘 9시 (오늘 배송분)
    const from = (now >= todayCutoff ? todayCutoff : prevCutoff).toISOString();
    const to   = (now >= todayCutoff ? nextCutoff  : todayCutoff).toISOString();

    const res = await fetch(`/.netlify/functions/orders?created_from=${encodeURIComponent(from)}&created_to=${encodeURIComponent(to)}`);
    const rows = await res.json();
    if (!rows.length) {
      status.textContent = '오늘 접수된 웹주문 없음';
      return;
    }
    // 카카오 주문서 형식으로 변환해서 textarea에 추가
    const ta = document.getElementById('orderInput');

    // 이미 textarea에 있는 전화번호 추출 (중복 방지)
    const existingPhones = new Set(
      [...(ta.value || '').matchAll(/01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4}/g)]
        .map(m => m[0].replace(/[^0-9]/g, ''))
    );

    const newRows = rows.filter(o => {
      const phone = (o.customer_phone || '').replace(/[^0-9]/g, '');
      return phone && !existingPhones.has(phone);
    });

    if (!newRows.length) {
      status.textContent = `⚠️ 웹주문 ${rows.length}건 이미 포함됨 (중복 없음)`;
      return;
    }

    const blocks = newRows.map(o => {
      const items = (o.order_items || []).map(i => {
        const p = (i.price||0) * (i.qty||1);
        return `${i.item_name} x${i.qty||1} = ${p.toLocaleString()}원`;
      }).join('\n');
      const total = (o.order_items || []).reduce((s, i) => s + (i.price||0) * (i.qty||1), 0);
      return `📦 코코바스켓 주문\n👤 ${o.customer_name} / ${o.customer_phone}\n🏠 ${o.customer_address || o.address || ''}\n${items}\n─────────────\n합계: ${total.toLocaleString()}원`;
    }).join('\n\n🧺 코코바스켓 새 주문!\n\n');

    ta.value = ta.value ? ta.value + '\n\n' + blocks : blocks;
    status.textContent = `✅ 신규 웹주문 ${newRows.length}건 추가됨 (중복 ${rows.length - newRows.length}건 제외) → 주문 분석 눌러요`;
  } catch(e) {
    status.textContent = '불러오기 실패: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '📲 오늘 웹주문 불러오기 (계산기 접수분)';
  }
}

// ===== 주문 파싱 =====
function parseOrders() {
  const raw = document.getElementById('orderInput').value.trim();
  if (!raw) return;

  // 🧺 형식 우선, 📦 형식 차선, 없으면 빈줄 분리
  let blocks;
  if (raw.includes('🧺 코코바스켓 새 주문')) {
    blocks = raw.split(/(?=🧺 코코바스켓 새 주문)/);
  } else if (raw.includes('📦 코코바스켓 주문')) {
    blocks = raw.split(/(?=📦 코코바스켓 주문)/);
  } else {
    blocks = raw.split(/\n{2,}|={3,}|-{3,}/);
  }
  parsedOrders = blocks.map(b => parseOneOrder(b.trim())).filter(o => o && (o.name || o.phone));

  renderPacking(parsedOrders);
  renderDelivery();

  // 재주문인데 DB 미스인 경우 → Supabase에 자동 재조회
  lookupMissingReorders();

  // DB에 주문 저장 (비동기, 백그라운드)
  // DB 저장은 계산기에서만 처리 (danji는 읽기/관리 전용)
}

function parseOneOrder(block) {
  const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return null;

  // 재주문 패턴: 🔄 재주문 / 010-xxxx  또는  🔄 재주문 (닉네임)
  const reorderLine = lines.find(l => l.includes('🔄') && l.includes('재주문'));
  if (reorderLine) {
    // 전화번호: 재주문 라인 → 전체 블록 순으로 탐색
    const pmLine = reorderLine.match(/01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4}/);
    const pmBlock = lines.map(l => l.match(/01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4}/)).find(Boolean);
    const pm = pmLine || pmBlock;
    const rPhone = pm ? pm[0].replace(/[^0-9]/g,'') : '';

    // 이름: 👤 라인에서 추출
    let rName = '', rAddr = '', rEntry = '';
    for (const line of lines) {
      if (line.startsWith('👤')) {
        // "👤 이름/ 폰" 또는 "👤 이름 폰" 또는 "👤 이름"
        const nm = line.match(/👤\s*(.+?)(?:\s*\/|\s+01[0-9]|$)/);
        if (nm && nm[1].trim()) rName = nm[1].trim();
      }
      if (line.startsWith('🏠')) {
        const am = line.match(/🏠\s*(.+?)(?:\s*\[|$)/);
        if (am) rAddr = am[1].trim();
        const bm = line.match(/비번:\s*([^\s\/]+)/i);
        if (bm) rEntry = bm[1].trim();
      }
      // 동호수 라벨
      const dongLabel = line.match(/^(?:동\/호수|주소|동호수)[\s]*[:：]\s*(.+)/);
      if (dongLabel && !rAddr) rAddr = dongLabel[1].trim();
      // 현관비번 라벨
      const entryMatch = line.match(/현관[비번\s]*[:：]?\s*(.{2,15})/i) || line.match(/비번[:：]?\s*(.{2,15})/i);
      if (entryMatch && !rEntry) rEntry = entryMatch[1].trim();
    }

    const items = [];
    let total = 0;
    for (const line of lines) {
      const item = parseItem(line);
      if (item) items.push(item);
      const tm = line.match(/합계[:：]?\s*([0-9,]+)원/);
      if (tm) total = parseInt(tm[1].replace(/,/g,''));
    }
    const itemSum = items.reduce((s,i)=>s+i.price*i.qty,0);
    total = itemSum > 0 ? itemSum : total;

    // 전화번호 → 닉네임/이름 → 주소 순으로 고객 조회
    let dbMatch = rPhone ? findCustomer(rPhone, '') : null;
    if (!dbMatch && rName) {
      dbMatch = customerDB.find(c => c.name && (c.name.includes(rName) || rName.includes(c.name.split(/[\(\（]/)[0].trim())));
    }
    if (!dbMatch && rAddr) dbMatch = findCustomer('', rAddr);

    return {
      name: dbMatch ? dbMatch.name : (rName || '재주문'),
      phone: rPhone || (dbMatch ? dbMatch.phone : ''),
      address: dbMatch ? dbMatch.address : rAddr,
      entry: dbMatch ? dbMatch.entry : rEntry,
      items, total, dbMatch: !!dbMatch, isReorder: true
    };
  }

  let name = '', phone = '', address = '', entry = '', total = 0;
  const items = [];

  for (const line of lines) {
    // 👤 이름/전화 라인
    if (line.startsWith('👤')) {
      const nm = line.match(/👤\s*([^\/]+)\//);
      if (nm && !name) {
        // 닉네임 중복 제거: "이름 (닉) (닉)" → "이름 (닉)"
        name = nm[1].trim().replace(/(\s*\([^)]*\))\s*\1+/g, '$1').trim();
      }
      const pm = line.match(/01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4}/);
      if (pm && !phone) phone = pm[0];
      continue;
    }
    // 🏠 주소/비번 라인 (📦 형식)
    if (line.startsWith('🏠')) {
      if (!address) {
        const am = line.match(/🏠\s*(.+?)(?:\s*\[|$)/);
        if (am) address = am[1].trim();
      }
      if (!entry) {
        const bm = line.match(/비번[:：]?\s*([^\s\]\/]+)/i);
        if (bm) entry = bm[1].trim();
      }
      continue;
    }
    // 📍 주소 라인 (🧺 형식)
    if (line.startsWith('📍')) {
      if (!address) {
        const am = line.match(/📍\s*(.+)/);
        if (am) address = am[1].trim();
      }
      continue;
    }
    // 🔑 비번 라인 (🧺 형식)
    if (line.startsWith('🔑')) {
      if (!entry) {
        const em = line.match(/🔑\s*(.+)/);
        if (em) {
          const ev = em[1].trim();
          entry = (ev === '없음' || ev === '없음.' || ev === '-') ? '' : ev;
        }
      }
      continue;
    }

    // 전화번호
    const phoneMatch = line.match(/01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4}/);
    if (phoneMatch && !phone) { phone = phoneMatch[0]; }

    // 이름 라벨 패턴
    const nameLabel = line.match(/^(?:이름|성함|닉네임|주문자)[\s]*[:：]\s*(.+)/);
    if (nameLabel && !name) { name = nameLabel[1].trim(); }

    // 연락처 라벨 패턴
    const phoneLabel = line.match(/^(?:연락처|전화|전화번호|휴대폰)[\s]*[:：]\s*(.+)/);
    if (phoneLabel && !phone) {
      const pm = phoneLabel[1].match(/01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4}/);
      if (pm) phone = pm[0];
    }

    // 동호수 라벨 패턴
    const dongLabel = line.match(/^(?:동\/호수|주소|동호수|호수)[\s]*[:：]\s*(.+)/);
    if (dongLabel && !address) { address = dongLabel[1].trim(); }

    // 주소
    if (!line.startsWith('🏠') &&
        (line.includes('동') || line.includes('로') || line.includes('길') || line.includes('마을')) &&
        line.match(/\d+호/) && line.length > 6 && !address) {
      address = line;
    }

    // 현관비번
    const entryMatch = line.match(/현관[비번\s]*[:：]?\s*(.{2,15})/i) ||
                       line.match(/비번[:：]?\s*(.{2,15})/i) ||
                       line.match(/공동현관[:：]?\s*(.{2,15})/i);
    if (entryMatch && !entry) entry = entryMatch[1].trim();

    // 합계
    const totalMatch = line.match(/합계[:：]?\s*([0-9,]+)원/) ||
                       line.match(/총금액[:：]?\s*([0-9,]+)원/) ||
                       line.match(/총액[:：]?\s*([0-9,]+)원/);
    if (totalMatch) total = parseInt(totalMatch[1].replace(/,/g, ''));

    // 품목
    const item = parseItem(line);
    if (item) items.push(item);
  }

  // 이름 추출
  if (!name) {
    for (const line of lines) {
      // 이름(전화) 패턴
      const np = line.match(/^([가-힣a-zA-Z_\-\s]{2,15})\s*[\(\（]?(01[0-9][.\-\s]?\d{3,4}[.\-\s]?\d{4})/);
      if (np) { name = np[1].trim(); if (!phone) phone = np[2]; break; }

      const slash = line.match(/^([가-힣a-zA-Z_\-\s]{2,20})[\/]([가-힣a-zA-Z_\-\s]{2,10})/);
      if (slash && !line.match(/\d+호|동\/호/)) { name = slash[1].trim(); break; }

      // 식재료·품목명으로 오인될 수 있는 단어 제외
      const PRODUCT_KEYWORDS = /봉|개|팩|판|단|키로|콩나물|시금치|감자|고구마|애호박|가지|오이|배추|카라향|고당도|수박|포도|참외|양파|마늘|코코|바스켓/;
      if (/^[가-힣a-zA-Z\s_\-\.]{2,15}$/.test(line) && !line.match(/\d/) && !PRODUCT_KEYWORDS.test(line)) {
        name = line.trim(); break;
      }

      const paren = line.match(/^(.{2,20}?)\s*[\（\(]/);
      if (paren && !paren[1].match(/\d/) && paren[1].length < 20) {
        name = paren[1].trim(); break;
      }
    }
  }

  if (!address) {
    for (const line of lines) {
      if ((line.includes('동') || line.includes('로') || line.includes('길') || line.includes('마을')) &&
          line.match(/\d+호/) && line.length > 6) {
        address = line; break;
      }
    }
  }

  // 합계는 항상 품목 합산으로 계산 (합계 라인 오염 방지)
  const itemSum = items.reduce((s, i) => s + i.price * i.qty, 0);
  total = itemSum > 0 ? itemSum : total;

  const cleanPhone = phone.replace(/[^0-9]/g, '');
  const dbMatch = findCustomer(cleanPhone, address);
  if (dbMatch) {
    if (!name) name = dbMatch.name;
    if (!address) address = dbMatch.address;
    if (!entry) entry = dbMatch.entry;
  }

  return { name, phone, address, entry, items, total, dbMatch: !!dbMatch };
}

function parseItem(line) {
  if (/^(합계|총금액|총액|이름|성함|연락처|주소|동[\/.]호수|현관|비번|결제|입금|메모|날짜)/.test(line)) return null;
  if (/코코바스켓/.test(line)) return null;
  if (/^[_\-=]{3,}/.test(line)) return null;
  if (!line.includes('원')) return null;

  let m = line.match(/^(.+?)\s*[×xX✕✖⨯Xx]\s*(\d+)\s*=\s*([0-9,]+)원/);
  if (m) { const qty = parseInt(m[2]); const total = parseInt(m[3].replace(/,/g, '')); return { name: m[1].trim(), qty, price: Math.round(total / qty) }; }

  m = line.match(/^(.+?)\s*=\s*([0-9,]+)원\s*$/);
  if (m && !/(합계|총금액|총액|이름|주소|연락처)/.test(m[1])) return { name: m[1].trim(), qty: 1, price: parseInt(m[2].replace(/,/g, '')) };

  m = line.match(/^(.+?)\s*[-–]\s*([0-9,]+)원\s*$/);
  if (m && !/(합계|총금액|총액|이름|주소|연락처)/.test(m[1])) return { name: m[1].trim(), qty: 1, price: parseInt(m[2].replace(/,/g, '')) };

  return null;
}

// ===== 렌더링 =====
function renderPacking(orders) {
  const el = document.getElementById('packingList');
  const totalItems = orders.reduce((s, o) => s + o.items.length, 0);
  document.getElementById('packCount').textContent = `${orders.length}건 · ${totalItems}개 품목`;

  _packOrders = orders;
  el.innerHTML = orders.map((o, i) => {
    const label = o.name || `주문 ${i+1}`;
    const rows = o.items.map(item => {
      const hasGrape = item.name.includes('델라웨어') || item.name.includes('+');
      const nameHtml = hasGrape
        ? item.name.replace('델라웨어', '<span style="color:#e63946;font-weight:900;">🍇델라웨어</span>')
        : item.name;
      const grapeAlert = hasGrape && item.name.includes('델라웨어')
        ? `<div style="font-size:11px;color:#e63946;font-weight:900;margin-top:2px;">⚠️ 델라웨어 꼭 챙기기!</div>`
        : '';
      return `
      <div class="pack-item" onclick="togglePack(this)">
        <div class="pack-name">${nameHtml}${item.qty > 1 ? ` ×${item.qty}` : ''}${grapeAlert}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="pack-qty">${item.qty}</div>
          <div class="pack-check"></div>
        </div>
      </div>`;
    }).join('');

    return `
      <div class="pack-order-block">
        <div class="pack-order-header">
          <span class="pack-order-num">${i+1}</span>
          <span class="pack-order-name">${label}</span>
          <span class="pack-order-total">${o.total ? o.total.toLocaleString()+'원' : ''}</span>
        </div>
        <div class="packing-grid">${rows}</div>
      </div>`;
  }).join('');
}

function togglePack(el) { el.classList.toggle('done'); }

// ── 패킹 뷰 전환 ──────────────────────────────────────────────────────
let _packOrders = [];
function switchPackView(mode) {
  document.getElementById('ptab-order').classList.toggle('on', mode === 'order');
  document.getElementById('ptab-item').classList.toggle('on', mode === 'item');
  document.getElementById('packingList').style.display = mode === 'order' ? '' : 'none';
  document.getElementById('packingItemSummary').style.display = mode === 'item' ? '' : 'none';
  if (mode === 'item') renderPackingByItem(_packOrders);
}

function renderPackingByItem(orders) {
  // ── 이름에서 단위 수량 추출
  function extractUnitQty(name) {
    // 수박: 1통 단위
    if (name.includes('수박')) return { qty: 1, unit: '통' };
    const panM = name.match(/(\d+)판/);
    if (panM) return { qty: parseInt(panM[1]), unit: '판' };
    const unitM = name.match(/(\d+)(팩|봉|개|단|통|kg|키로|킬로|묶음)/);
    if (unitM) return { qty: parseInt(unitM[1]), unit: unitM[2] };
    return { qty: 1, unit: '' };
  }

  // ── 기본 품목명 추출
  function baseName(name) {
    // 수박: 무게 정보 보존
    if (name.includes('수박')) {
      if (name.includes('9kg↑') || name.includes('9kg이상') || name.includes('10kg') || name.includes('10키로')) return '수박 9kg↑';
      if (name.includes('8kg') || name.includes('8키로')) return '수박 8kg';
      const kgM = name.match(/(\d+)kg/i) || name.match(/(\d+)키로/);
      if (kgM) return `수박 ${kgM[1]}kg`;
      return '수박';
    }
    if (name.startsWith('#')) return name;
    const isLeafOrPepper = ['잎채소','고추'].some(k => name.includes(k));
    if (isLeafOrPepper) {
      const noEmoji = name.replace(/[\u{1F300}-\u{1FFFF}]/gu, '').trim();
      return noEmoji.replace(/\d+(봉|개|팩|단)/g, '').replace(/\s+/g,' ').trim() || name;
    }
    const clean = name.replace(/\s*[\(\（][^)）]*[\)\）]/g, '').trim();
    const noEmoji = clean.replace(/[\u{1F300}-\u{1FFFF}]/gu, '').trim();
    const noUnit = noEmoji.replace(/\d+(판|봉|팩|개|단|통|kg|키로|킬로|묶음|1판~|2판~)/g, '').trim();
    return noUnit.replace(/\s+/g, ' ').trim() || name;
  }

  // ── 세트 품목 분리 함수
  function expandItems(items) {
    const result = [];
    items.forEach(item => {
      if (item.name.includes('+') && (item.name.includes('델라웨어') || item.name.includes('[선착순특가]'))) {
        // "+" 기준으로 분리 (대괄호 태그 제거)
        const parts = item.name.replace(/\s*\[.*?\]\s*/g, '').split('+').map(s => s.trim()).filter(Boolean);
        parts.forEach(p => result.push({ ...item, name: p }));
      } else {
        result.push(item);
      }
    });
    return result;
  }

  // ── 품목 집계
  const map = {};
  orders.forEach(o => {
    const customerName = (o.name || '').replace(/\s*\(.*?\)\s*/g, '').trim() || '?';
    const expandedItems = expandItems(o.items || []);
    expandedItems.forEach(item => {
      const { qty: unitQty, unit } = extractUnitQty(item.name);
      const base = baseName(item.name);
      const orderQty = item.qty || 1;
      const totalUnits = unitQty * orderQty;
      if (!map[base]) map[base] = { name: base, totalUnits: 0, unit, customers: [], variants: [], typeBreakdown: {} };
      map[base].totalUnits += totalUnits;
      map[base].customers.push(customerName);
      const exist = map[base].variants.find(v => v.name === item.name);
      if (exist) exist.count += orderQty;
      else map[base].variants.push({ name: item.name, count: orderQty });
      // 스테퍼 typeChoices 파싱: "(오이×4+가지×2)" 또는 "(상추+치커리+케일)"
      const tcMatch = item.name.match(/\(([^)]+(?:×\d+[^)]*|[^)]+))\)\s*$/);
      if (tcMatch) {
        const parts = tcMatch[1].split('+');
        parts.forEach(p => {
          const numM = p.match(/^(.+?)×(\d+)$/);
          if (numM) {
            const t = numM[1].trim(), n = parseInt(numM[2]) * orderQty;
            map[base].typeBreakdown[t] = (map[base].typeBreakdown[t] || 0) + n;
          } else {
            const t = p.trim();
            if (t) map[base].typeBreakdown[t] = (map[base].typeBreakdown[t] || 0) + orderQty;
          }
        });
      }
    });
  });

  const eggKw    = ['특란','유정란','계란','달걀'];
  const leafKw   = ['잎채소'];
  const pepperKw = ['고추'];
  const vegeKw   = ['양파','대파','마늘','배추','애호박','오이','감자','버섯','팽이','느타리','상추','치커리','케일','청경채','깻잎','시금치','쑥갓','두부','순두부','파','가지','고구마','당근','브로콜리','숙주','콩나물','무','양배추','마늘쫑'];
  const fruitKw  = ['토마토','참외','블루베리','부사','카라향','귤','오렌지','감','사과','딸기','포도','수박','메론','짭짤이','방울','찰토마토','키위'];
  const egg = [], leaf = [], pepper = [], veg = [], fruit = [], etc = [];

  Object.values(map).forEach(item => {
    const n = item.name;
    if      (eggKw.some(k => n.includes(k)))    egg.push(item);
    else if (leafKw.some(k => n.includes(k)))   leaf.push(item);
    else if (pepperKw.some(k => n.includes(k))) pepper.push(item);
    else if (vegeKw.some(k => n.includes(k)))   veg.push(item);
    else if (fruitKw.some(k => n.includes(k)))  fruit.push(item);
    else etc.push(item);
  });

  const el = document.getElementById('packingItemSummary');

  // ── 태그 섹션 (계란·잎채소·고추)
  function taggedSection(emoji, title, accentColor, bgColor, borderColor, warnSuffix, items) {
    if (!items.length) return '';
    const customerCount = {};
    items.forEach(item => item.customers.forEach(c => { customerCount[c] = (customerCount[c]||0)+1; }));
    const rows = items.sort((a,b)=>b.totalUnits-a.totalUnits).map(item => {
      const tags = item.customers.map(c => {
        const multi = customerCount[c] >= 2;
        return '<span style="display:inline-block;padding:1px 5px;border-radius:10px;font-size:10px;font-weight:700;background:' +
          (multi ? '#fde68a;color:#92400e' : '#dbeafe;color:#1e40af') + ';">' + c + (multi ? '⚠️' : '') + '</span>';
      }).join(' ');
      // 세부 variants 표시
      const variantNote = item.variants.length > 1
        ? '<div style="font-size:10px;color:#888;margin-top:2px;">' + item.variants.map(v=>v.name+(v.count>1?` ×${v.count}`:'')).join(' / ') + '</div>'
        : '';
      return '<div onclick="this.classList.toggle(\'pdone\')" style="display:flex;flex-direction:column;gap:4px;padding:7px 9px;border-radius:8px;cursor:pointer;border:2px solid ' + borderColor + ';background:' + bgColor + ';">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div><span style="font-size:12px;color:#333;font-weight:700;">' + item.name + '</span>' +
        (item.unit ? '<span style="font-size:10px;color:#888;margin-left:3px;">총</span>' : '') +
        '</div>' +
        '<span style="font-size:24px;font-weight:900;color:' + accentColor + ';">' + item.totalUnits + (item.unit||'') + '</span>' +
        '</div>' +
        variantNote +
        '<div style="display:flex;flex-wrap:wrap;gap:3px;">' + tags + '</div>' +
        '</div>';
    }).join('');
    const multiCustomers = Object.entries(customerCount).filter(([,v])=>v>=2).map(([k])=>k);
    const warning = multiCustomers.length
      ? '<div style="font-size:11px;color:#92400e;background:#fef3c7;border-radius:6px;padding:4px 8px;margin-bottom:6px;">⚠️ ' + multiCustomers.join(', ') + ' — ' + warnSuffix + '</div>'
      : '';
    const cols = items.length === 1 ? '1fr' : 'repeat(2,1fr)';
    return '<div style="margin-bottom:12px;">' +
      '<div style="font-size:11px;font-weight:800;color:' + accentColor + ';margin-bottom:5px;">' + emoji + ' ' + title + ' <span style="opacity:.4;">' + items.length + '종</span></div>' +
      warning +
      '<div style="display:grid;grid-template-columns:' + cols + ';gap:5px;">' + rows + '</div>' +
      '</div>';
  }

  function section(emoji, title, color, items) {
    if (!items.length) return '';
    const rows = items.sort((a,b)=>b.totalUnits-a.totalUnits).map(item => {
      const orderCount = item.customers.length;
      // 교차 선택 품목 감지 (오이·가지, 감자·고구마, 잎채소 등)
      const isCross = item.variants.some(v => v.name.includes('교차') || v.name.includes('오이') || v.name.includes('가지') || v.name.includes('잎채소') || v.name.includes('감자') || v.name.includes('고구마'));
      if (isCross) {
        // 고객별로 분리 표시
        const perCustomer = [];
        orders.forEach(o => {
          const cName = (o.name||'').replace(/\s*\(.*?\)\s*/g,'').trim()||'?';
          (o.items||[]).forEach(it => {
            if (baseName(it.name) === item.name) {
              // 괄호 안 선택 내용 추출
              const choiceM = it.name.match(/\(([^)]+)\)\s*(?:x\d+)?$/i);
              const choice = choiceM ? choiceM[1] : '확인필요';
              const isUnknown = choice === '교차가능' || choice === '확인필요';
              const totalU = (it.qty||1) * (it.name.includes('6개') ? 6 : it.name.includes('3봉') ? 3 : it.name.includes('2봉') ? 2 : 1);
              perCustomer.push({ cName, choice, totalU, isUnknown });
            }
          });
        });
        const rows2 = perCustomer.map(p =>
          '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:5px;border:1px solid ' + (p.isUnknown?'#fcd34d':'#e5e7eb') + ';background:' + (p.isUnknown?'#fffbeb':'#fff') + ';margin-bottom:3px;">' +
          '<div><div style="font-size:12px;color:#333;font-weight:700;">' + p.cName + '</div>' +
          '<div style="font-size:11px;color:' + (p.isUnknown?'#d97706':'#059669') + ';">' + (p.isUnknown?'⚠️ ':' ') + p.choice + '</div></div>' +
          '<div style="font-size:20px;font-weight:900;color:' + color + ';">' + p.totalU + (item.unit||'개') + '</div>' +
          '</div>'
        ).join('');
        return '<div onclick="this.classList.toggle(\'pdone\')" style="border-radius:6px;cursor:pointer;border:1px solid #e5e7eb;background:#f9f9f9;padding:6px 8px;margin-bottom:2px;">' +
          '<div style="font-size:12px;font-weight:800;color:#333;margin-bottom:5px;">' + item.name + ' <span style="font-size:11px;color:' + color + ';font-weight:900;">' + item.totalUnits + (item.unit||'') + '</span></div>' +
          rows2 + '</div>';
      }
      // 일반 품목
      const orderNote = orderCount > 1
        ? '<div style="font-size:10px;color:#999;margin-top:1px;">' + item.customers.join(', ') + '</div>'
        : '<div style="font-size:10px;color:#bbb;margin-top:1px;">' + (item.customers[0]||'') + '</div>';
      return '<div onclick="this.classList.toggle(\'pdone\')" style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:6px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;">' +
        '<div style="flex:1;min-width:0;overflow:hidden;">' +
        '<div style="font-size:12px;color:#333;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;">' + item.name + '</div>' +
        orderNote +
        '</div>' +
        '<div style="text-align:right;flex-shrink:0;margin-left:8px;">' +
        '<div style="font-size:22px;font-weight:900;color:' + color + ';line-height:1;">' + item.totalUnits + (item.unit||'') + '</div>' +
        (orderCount > 1 ? '<div style="font-size:10px;color:#aaa;">' + orderCount + '건</div>' : '') +
        '</div>' +
        '</div>';
    }).join('');
    const totalUnitsAll = items.reduce((s,i)=>s+i.totalUnits,0);
    const firstUnit = items[0]?.unit || '';
    return '<div style="margin-bottom:12px;">' +
      '<div style="font-size:11px;font-weight:800;color:' + color + ';margin-bottom:5px;">' + emoji + ' ' + title + ' <span style="opacity:.4;">' + items.length + '종 · 총 ' + totalUnitsAll + (firstUnit||'건') + '</span></div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;">' + rows + '</div>' +
      '</div>';
  }

  const totalQty = Object.values(map).reduce((s,i)=>s+i.totalUnits,0);
  el.innerHTML =
    '<style>#packingItemSummary .pdone{opacity:.25;} #packingItemSummary .pdone span:first-child{text-decoration:line-through;}</style>' +
    '<div style="background:#2d7a4f;color:#fff;border-radius:8px;padding:7px 12px;margin-bottom:10px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;">' +
    '<span>📦 품목별 합계</span><span style="opacity:.8;">' + Object.keys(map).length + '종</span></div>' +
    taggedSection('🥚','계란',        '#d97706','#fffbeb','#fcd34d','계란 2종 챙기기', egg) +
    taggedSection('🥬','잎채소',      '#16a34a','#f0fdf4','#86efac','잎채소 2종 챙기기', leaf) +
    taggedSection('🌶️','고추류',      '#dc2626','#fff1f2','#fca5a5','고추 2종 챙기기', pepper) +
    section('🥦','채소·기타','#2d7a4f', veg) +
    section('🍎','과일','#e63946', fruit) +
    section('📦','기타','#6366f1', etc);
}

// ===== 지역 분류 =====
function classifyRegion(address) {
  if (!address) return 'goyang';
  const a = address;
  const unjeongKw = ['파주','운정','산내','해슬','가람','별하람','한빛','한울','야당','교하','동패','책향기','청암로','청석로','미래로','와동','심학산','힐스테이트더운정','힐스더운정','물향기','숲속길','노을빛','문발','초롱꽃'];
  for (const kw of unjeongKw) if (a.includes(kw)) return 'unjeong';
  return 'goyang';
}

function getRegionOrder(address) {
  if (!address) return 99;
  const a = address;

  // 운정 구역 순서
  const unjeong1 = ['가람','별하람','힐스테이트더운정','힐스더운정'];
  const unjeong2 = ['해슬','산내'];
  const unjeong3 = ['한빛','한울','야당'];
  const unjeong4 = ['물향기','교하','책향기','숲속길','노을빛','문발','초롱꽃','동패'];

  for (const kw of unjeong1) if (a.includes(kw)) return 1;
  for (const kw of unjeong2) if (a.includes(kw)) return 2;
  for (const kw of unjeong3) if (a.includes(kw)) return 3;
  for (const kw of unjeong4) if (a.includes(kw)) return 4;

  // 고양 구역 순서
  const goyang1 = ['백석','마두'];
  const goyang2 = ['장항','정발산','주엽'];
  const goyang3 = ['대화','가좌','덕이'];

  for (const kw of goyang1) if (a.includes(kw)) return 11;
  for (const kw of goyang2) if (a.includes(kw)) return 12;
  for (const kw of goyang3) if (a.includes(kw)) return 13;

  return 99; // 기타
}

let currentRegion = 'all';

function switchRegion(region, btn) {
  currentRegion = region;
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('on'));
  if (btn) btn.classList.add('on');
  applyRegionFilter();
}

function applyRegionFilter() {
  document.querySelectorAll('.d-card').forEach(card => {
    const r = card.dataset.region;
    card.style.display = (currentRegion === 'all' || r === currentRegion) ? '' : 'none';
  });
}

function renderDelivery() {
  const el = document.getElementById('deliveryCards');
  document.getElementById('deliveryCount').textContent = `${parsedOrders.length}건`;

  // 이름 정제: 닉네임 중복 제거 (예: "이름 (닉) (닉)" → "이름 (닉)")
  function cleanName(n) {
    if (!n) return n;
    return n.replace(/(\s*\([^)]*\))\s*\1+/g, '$1').trim();
  }

  // 지역별 카운트
  const counts = {all: parsedOrders.length, unjeong:0, goyang:0};

  // 동선 순서로 정렬
  const sorted = [...parsedOrders.entries()].sort((a, b) => {
    const ra = getRegionOrder(a[1].address);
    const rb = getRegionOrder(b[1].address);
    return ra - rb;
  });

  el.innerHTML = sorted.map(([i, o]) => {
    const region = classifyRegion(o.address);
    counts[region]++;

    const itemsHtml = (o.items||[]).map(item => {
      const name = item.name || '';
      const qty = item.qty || 1;
      const price = item.price || 0;
      const displayName = qty > 1
        ? `<span style="font-weight:700">${name}</span><span style="font-weight:900;color:#e63946;margin-left:3px;">${qty}개</span>`
        : `<span>${name}</span>`;
      return `<div class="d-item-row"><span>${displayName}</span><span>${(price*qty).toLocaleString()}원</span></div>`;
    }).join('');

    const reorderBadge = o.isReorder ? '<span style="font-size:10px;background:#e8f0ff;color:#185FA5;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;">🔄재주문</span>' : '';
    const newBadge = !o.dbMatch
      ? `<button class="btn-add-db" onclick="addCustomerToDB(${i})">+ DB 추가</button>`
      : '<span style="font-size:10px;color:#2d7a4f">✓DB</span>';
    const isUnknownReorder = o.isReorder && (!o.name || o.name === '재주문') && !o.address;
    const noInfoWarning = isUnknownReorder
      ? `<div style="font-size:11px;color:#8B0000;background:#fff0f0;border:1px solid #ffb3b3;padding:7px 10px;border-radius:6px;margin-bottom:6px;line-height:1.5;">
          ⚠️ <strong>주소 확인 필요</strong><br>
          이 번호는 DB에 없어요. 카톡으로 주소 요청하세요.<br>
          <span style="color:#888;font-size:10px;">📞 ${formatPhone(o.phone)}</span>
         </div>`
      : '';

    const regionLabel = region === 'unjeong'
      ? '<span class="region-label unjeong">운정</span>'
      : '<span class="region-label goyang">고양</span>';

    return `
    <div class="d-card" id="dcard-${i}" data-region="${region}">
      <div class="d-card-header">
        <div>
          <div class="d-name">${regionLabel} ${cleanName(o.name) || `주문 ${i+1}`}${reorderBadge} ${(o.entry && o.entry !== '없음') ? `<span class="d-entry-inline">🔑 ${o.entry}</span>` : `<span class="d-entry-inline" style="color:#aaa;background:#f5f5f5;">🔑 비번없음</span>`} ${newBadge}</div>
          <div class="d-phone">${formatPhone(o.phone)}</div>
        </div>
        <div class="d-total">${o.total ? o.total.toLocaleString()+'원' : ''}</div>
      </div>
      ${noInfoWarning}

async function loadHistory() {
  const dateFrom = document.getElementById('filterDateFrom').value;
  const dateTo   = document.getElementById('filterDateTo').value;
  const phone    = document.getElementById('filterPhone').value.replace(/[^0-9]/g, '');
  if (!dateFrom && !dateTo && !phone) return;

  const container = document.getElementById('historyContainer');
  container.innerHTML = '<p style="color:#aaa;font-size:13px">불러오는 중...</p>';

  try {
    // 기간 내 모든 날짜 또는 전화번호로 조회
    let url = '/api/orders?';
    if (dateFrom) url += `date_from=${dateFrom}&`;
    if (dateTo)   url += `date_to=${dateTo}&`;
    if (phone)    url += `phone=${phone}`;

    const res = await api(url);
    const data = await res.json();

    if (!data.length) {
      container.innerHTML = '<p style="color:#aaa;font-size:13px">결과 없음</p>';
      return;
    }

    // 합산 계산
    const totalOrders = data.length;
    const totalAmount = data.reduce((sum, o) => sum + (o.total_amount || 0), 0);

    let rows = data.map(o => {
      const d = o.created_at ? o.created_at.slice(0,10) : '-';
      const name = o.customer_name || '-';
      const addr = o.address || '-';
      const amt = (o.total_amount||0).toLocaleString();
      const items = (o.items||[]).map(i=>`${i.name}×${i.qty}`).join(', ') || '-';
      return `<tr>
        <td>${d}</td>
        <td>${name}</td>
        <td style="font-size:11px;color:#888">${addr}</td>
        <td style="color:#2e7d32;font-weight:700">${amt}원</td>
        <td style="font-size:11px;color:#666">${items}</td>
      </tr>`;
    }).join('');

    container.innerHTML = `
      <div style="background:#e8f5e9;border-radius:8px;padding:10px 16px;margin-bottom:10px;display:flex;gap:24px;">
        <span style="font-size:14px;font-weight:700;color:#2e7d32">📦 ${totalOrders}건</span>
        <span style="font-size:14px;font-weight:700;color:#1565c0">💰 ${totalAmount.toLocaleString()}원</span>

        <thead><tr><th>날짜</th><th>이름</th><th>주소</th><th>금액</th><th>품목</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) {
    container.innerHTML = '<p style="color:red;font-size:13px">오류: ' + e.message + '</p>';

}

function setStatPeriod(period) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0, 10);
  let from, to;
  if (period === 'today') {
    from = to = fmt(today);
  } else if (period === 'week') {
    const day = today.getDay(); // 0=일
    const mon = new Date(today); mon.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
    from = fmt(mon); to = fmt(today);
  } else if (period === 'month') {
    from = fmt(new Date(today.getFullYear(), today.getMonth(), 1));
    to = fmt(today);
  } else if (period === 'lastmonth') {
    const first = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const last = new Date(today.getFullYear(), today.getMonth(), 0);
    from = fmt(first); to = fmt(last);
  }
  document.getElementById('statsDateFrom').value = from;
  document.getElementById('statsDateTo').value = to;

}

async function loadStats() {
  const from = document.getElementById('statsDateFrom').value;
  const to = document.getElementById('statsDateTo').value;

  try {
    let url = '/api/orders?';
    if (from) url += `date_from=${from}&`;
    if (to) url += `date_to=${to}&`;
    const res = await api(url);
    const data = await res.json();

    // 필터
    const filtered = data.filter(o => {
      if (from && o.order_date < from) return false;
      if (to && o.order_date > to) return false;
      return true;
    });

    const totalRevenue = filtered.reduce((s, o) => s + (o.total || 0), 0);
    const totalOrders = filtered.length;
    const avgOrder = totalOrders ? Math.round(totalRevenue / totalOrders) : 0;

    // 품목별 집계 (qty/price null 안전 처리)
    const itemMap = {};
    filtered.forEach(o => {
      (o.order_items || []).forEach(i => {
        const qty = Number(i.qty) || 1;
        const price = Number(i.price) || 0;
        if (!itemMap[i.item_name]) itemMap[i.item_name] = { qty: 0, revenue: 0 };
        itemMap[i.item_name].qty += qty;
        itemMap[i.item_name].revenue += qty * price;
      });
    });

    const sortedItems = Object.entries(itemMap).sort((a, b) => b[1].revenue - a[1].revenue);

    document.getElementById('statCards').innerHTML = `
      <div class="stat-card"><div class="stat-label">총 매출</div><div class="stat-value">${totalRevenue.toLocaleString()}원</div><div class="stat-sub">${from || '전체'}${to ? ' ~ '+to : ''}</div></div>
      <div class="stat-card"><div class="stat-label">주문 건수</div><div class="stat-value">${totalOrders}건</div></div>
      <div class="stat-card"><div class="stat-label">평균 주문액</div><div class="stat-value">${avgOrder.toLocaleString()}원</div></div>
    `;

    document.getElementById('itemStats').innerHTML = `
      <div class="result-title" style="margin-top:16px">품목별 판매</div>
      <table class="history-table">
        <thead><tr><th>품목</th><th>수량</th><th>매출</th></tr></thead>
        <tbody>
          ${sortedItems.map(([name, v]) => `
            <tr>
              <td>${name}</td>
              <td>${v.qty}개</td>
              <td style="font-weight:700;color:#2d7a4f">${v.revenue.toLocaleString()}원</td>
            </tr>`).join('')}
        </tbody>
      </table>`;

    // 기간 내 단골 TOP10
    const phoneMap = {};
    filtered.forEach(o => {
      const key = o.customer_phone || '번호없음';
      if (!phoneMap[key]) phoneMap[key] = { name: o.customer_name || '-', phone: key, cnt: 0, total: 0 };
      phoneMap[key].cnt++;
      phoneMap[key].total += (o.total || 0);
    });
    const topCusts = Object.values(phoneMap).filter(c => c.cnt >= 2).sort((a,b) => b.cnt - a.cnt).slice(0, 10);
    const periodEl = document.getElementById('periodLoyalStats');
    if (periodEl) {
      if (topCusts.length === 0) {
        periodEl.innerHTML = '';
      } else {
        periodEl.innerHTML = `
          <div class="result-title" style="margin-top:20px">🔁 기간 내 재주문 고객 <span style="font-size:12px;font-weight:400;color:#aaa">(2회 이상)</span></div>
          <table class="period-cust-table">
            <thead><tr><th>이름</th><th>연락처</th><th>주문 횟수</th><th>기간 합계</th></tr></thead>
            <tbody>
              ${topCusts.map(c => `
                <tr>
                  <td style="font-weight:600">${c.name}</td>
                  <td style="color:#888">${formatPhone(c.phone)}</td>
                  <td style="font-weight:700;color:#2d7a4f">${c.cnt}회</td>
                  <td style="font-weight:700;color:#185FA5">${c.total.toLocaleString()}원</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      }
    }
  } catch (e) {
    document.getElementById('statCards').innerHTML = `<p style="color:#c00">오류: ${e.message}</p>`;
  }
}

// ===== 단골 랭킹 =====
async function loadLoyalStats() {
  const container = document.getElementById('loyalContainer');
  const summary = document.getElementById('loyalSummary');
  const countEl = document.getElementById('loyalCount');
  if (container) container.innerHTML = '<p style="color:#aaa;font-size:13px">⏳ 불러오는 중...</p>';

  try {
    const res = await api('/api/orders?all=1');
    const data = await res.json();

    // 전화번호 있는 주문만 그룹핑 (없는 건 별도 카운트)
    const phoneMap = {};
    let noPhoneCnt = 0;
    data.forEach(o => {
      const phone = (o.customer_phone || '').replace(/[^0-9]/g, '');
      if (!phone || phone.length < 9) { noPhoneCnt++; return; }
      if (!phoneMap[phone]) {
        phoneMap[phone] = { name: o.customer_name || '-', phone, cnt: 0, total: 0, lastDate: '' };
      }
      phoneMap[phone].cnt++;
      phoneMap[phone].total += (o.total || 0);
      if (o.order_date > phoneMap[phone].lastDate) {
        phoneMap[phone].lastDate = o.order_date;
        phoneMap[phone].name = o.customer_name || phoneMap[phone].name;
      }
    });

    const all = Object.values(phoneMap).sort((a, b) => b.cnt - a.cnt);
    const maxCnt = all.length ? all[0].cnt : 1;
    const totalCustomers = all.length;
    const repeatCustomers = all.filter(c => c.cnt >= 2).length;
    const totalRevenue = all.reduce((s, c) => s + c.total, 0);

    if (countEl) countEl.textContent = `${totalCustomers}명`;

    if (summary) {
      summary.innerHTML = `
        <div class="loyal-chip"><span>${totalCustomers}</span>총 고객</div>
        <div class="loyal-chip"><span>${repeatCustomers}</span>재주문 고객</div>
        <div class="loyal-chip"><span>${Math.round(repeatCustomers/totalCustomers*100)||0}%</span>재주문율</div>
        <div class="loyal-chip"><span>${totalRevenue.toLocaleString()}</span>원 누적</div>
        ${noPhoneCnt ? `<div class="loyal-chip" style="color:#aaa;font-size:12px">전번미등록 ${noPhoneCnt}건 제외</div>` : ''}
      `;
    }

    const medals = ['🥇','🥈','🥉'];
    const rows = all.map((c, i) => {
      const rank = i < 3 ? medals[i] : `${i+1}`;
      const barPct = Math.round(c.cnt / maxCnt * 100);
      const phoneDisp = c.phone.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-****-$3');
      return `
        <tr>
          <td class="loyal-rank">${rank}</td>
          <td style="font-weight:600">${c.name}</td>
          <td style="color:#888;font-size:12px">${phoneDisp}</td>
          <td class="loyal-cnt">${c.cnt}회</td>
          <td><div class="loyal-bar-wrap"><div class="loyal-bar" style="width:${barPct}%"></div></div></td>
          <td class="loyal-amt">${c.total.toLocaleString()}원</td>
          <td class="loyal-date">${c.lastDate || '-'}</td>
        </tr>`;
    }).join('');

    if (container) {
      container.innerHTML = `
        <table class="loyal-table">
          <thead>
            <tr>
              <th style="width:36px">순위</th>
              <th>이름</th>
              <th>연락처</th>
              <th>주문횟수</th>
              <th style="width:90px"></th>
              <th>누적금액</th>
              <th>마지막 주문</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }
  } catch (e) {
    if (container) container.innerHTML = `<p style="color:#c00;font-size:13px">오류: ${e.message}</p>`;
  }
}

// ===== 유틸 =====
function exportDB() {
  const header = '이름\t연락처\t주소\t현관비번\t메모';
  const rows = customerDB.map(c =>
    [c.name, c.phone ? c.phone.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3') : '', c.address, c.entry, c.memo].join('\t')
  );
  const tsv = [header, ...rows].join('\n');
  navigator.clipboard.writeText(tsv).then(() => showToast('✅ 클립보드에 복사됐어요!'));
}

function formatPhone(p) {
  if (!p) return '';
  const n = p.replace(/[^0-9]/g, '');
  if (n.length === 11) return `${n.slice(0,3)}-${n.slice(3,7)}-${n.slice(7)}`;
  return p;
}

function switchTab(key, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('panel-'+key).classList.add('on');
  if (key === 'stats') loadAvgSummary();
}

function clearAll() {
  document.getElementById('orderInput').value = '';
  document.getElementById('packingList').innerHTML = '';
  document.getElementById('deliveryCards').innerHTML = '';
  document.getElementById('packCount').textContent = '0개 품목';
  document.getElementById('deliveryCount').textContent = '0건';
  parsedOrders = [];
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', duration);
}

// 초기 로드 — 정적 DB 우선 적용 후 Supabase 병합
customerDB = [...STATIC_CUSTOMERS];
loadCustomersFromDB();
